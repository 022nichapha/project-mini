<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Thunder - Tracking</title>
</head>
<body>
    <nav>
        <h2 style="margin:0;">⚡ THUNDER</h2>
        <div>
            <a href="dashboard.html">หน้าหลัก</a> | 
            <a href="tracking.html" style="font-weight:bold;">ติดตามพัสดุ</a>
        </div>
    </nav>

    <div class="container">
        <h3>🔍 ค้นหาและติดตามพัสดุ</h3>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="trackID" placeholder="กรอกเลขพัสดุ เช่น TD789">
            <button onclick="showTrack()">ค้นหา</button>
        </div>

        <div id="trackResult" style="display:none; margin-top:30px; padding:20px; background:#f9f9f9; border-radius:10px;">
            <p><strong>พัสดุเลขที่:</strong> <span id="displayID"></span></p>
            <p>✅ <b>สถานะล่าสุด:</b> พัสดุถึงจุดคัดแยก (กรุงเทพฯ)</p>
            <p style="color: gray; font-size: 0.8rem;">อัปเดตเมื่อ: 27 มี.ค. 2026</p>
        </div>
    </div>

    <script>
        function showTrack() {
            const id = document.getElementById('trackID').value;
            if(id) {
                document.getElementById('displayID').innerText = id;
                document.getElementById('trackResult').style.display = 'block';
            }
        }
    </script>
</body>
</html>
