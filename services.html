<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Thunder - Service</title>
</head>
<body>
    <nav>
        <h2 style="margin:0;">⚡ THUNDER</h2>
        <div><a href="dashboard.html">กลับหน้าหลัก</a></div>
    </nav>

    <div class="container">
        <div style="background: #fff9db; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <h3>📥 ยืนยันการรับพัสดุ</h3>
            <p>กรุณากดปุ่มเมื่อได้รับสินค้าครบถ้วนแล้ว</p>
            <button onclick="alert('ขอบคุณที่ใช้บริการ Thunder ครับ!')">ยืนยันได้รับของแล้ว</button>
        </div>

        <div style="background: #fff; border: 1px solid #ffd700; padding: 15px; border-radius: 10px;">
            <h3>⚠️ แจ้งเคลมพัสดุ</h3>
            <input type="text" placeholder="เลขพัสดุที่ต้องการเคลม">
            <textarea style="width:100%; height:80px; margin: 10px 0;" placeholder="ระบุเหตุผลการเคลม..."></textarea>
            <button style="background: #ff4d4d; color:white;" onclick="alert('ส่งคำร้องเรียบร้อย ทีมงานจะติดต่อกลับโดยเร็วที่สุด')">ส่งข้อมูลเคลม</button>
        </div>
    </div>
</body>
</html>
