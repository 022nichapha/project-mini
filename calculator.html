<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Thunder - คำนวณค่าส่ง</title>
</head>
<body>
    <nav></nav>

    <div class="content-section" style="max-width: 500px;">
        <div class="card">
            <h3>🧮 คำนวณค่าจัดส่ง</h3>
            <div class="form-group">
                <label>น้ำหนัก (กก.)</label>
                <input type="number" id="w" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>ปลายทาง</label>
                <select id="dest">
                    <option value="30">กรุงเทพฯ</option>
                    <option value="50">ต่างจังหวัด</option>
                </select>
            </div>
            <button class="btn-action" style="width:100%" onclick="cal()">คำนวณ</button>
            <h2 id="res" style="margin-top:20px; color:var(--dark-yellow)"></h2>
        </div>
    </div>

    <script>
        function cal() {
            let total = parseFloat(document.getElementById('w').value || 0) * 15 + parseInt(document.getElementById('dest').value);
            document.getElementById('res').innerText = total + " บาท";
        }
    </script>
</body>
</html>
