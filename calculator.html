<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Thunder - คำนวณค่าส่ง</title>
</head>
<body>
    <nav>
        <div class="logo-section" onclick="location.href='calculator.html'">
            <h1>⚡ THUNDER</h1>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">หน้าหลัก</a>
            <a href="tracking.html">ติดตามพัสดุ</a>
            <a href="calculator.html">เช็คราคา</a>
            <a href="index.html" style="color: #ff4444;">ออกจากระบบ</a>
        </div>
    </nav>
    <div class="content-section" style="max-width: 500px;">
        <div class="card">
            <h3>🧮 คำนวณค่าจัดส่ง</h3>
            
            <div class="form-group">
                <label>น้ำหนัก (กก.)</label>
                <input type="number" id="w" placeholder="0.00">
            </div>
            
            <div class="form-group">
                <label>ปลายทาง</label>
                <select id="dest">
                    <option value="30">กรุงเทพฯ</option>
                    <option value="50">ต่างจังหวัด</option>
                </select>
            </div>
            
            <button class="btn-action" style="width:100%" onclick="cal()">คำนวณ</button>
            
            <h2 id="res" style="margin-top:20px; color:var(--dark-yellow)"></h2>
        </div>
    </div>


<script>
    function cal() {
        let weightInput = document.getElementById('w').value;
        let weight = parseFloat(weightInput || 0);
        let basePrice = parseInt(document.getElementById('dest').value);
        let resElement = document.getElementById('res');

        // 1. Validation: ตรวจสอบการกรอกข้อมูล
        if (weightInput === "" || weight <= 0) {
            resElement.innerText = "กรุณาระบุน้ำหนักที่ถูกต้อง";
            resElement.style.color = "#ff4444";
            return;
        }

        // 2. Calculation
        let shippingFee = weight * 15;
        let total = shippingFee + basePrice;

        // 3. Display with Formatting
        resElement.style.color = "var(--dark-yellow)";
        resElement.innerHTML = `
            <small style="font-size: 14px; color: #666; display: block;">ราคารวมทั้งสิ้น:</small>
            ${total.toLocaleString(undefined, {minimumFractionDigits: 2})} บาท
            <div style="font-size: 12px; color: #888; margin-top: 5px;">
                (ค่าขนส่ง ${shippingFee} + ค่าพื้นที่ ${basePrice})
            </div>
        `;
    }

    function resetForm() {
        document.getElementById('w').value = "";
        document.getElementById('res').innerText = "";
    }
</script>
</body>
</html>
