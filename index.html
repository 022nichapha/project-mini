<!DOCTYPE html>
<html lang="th">

    <title>Thunder - Login</title>
</head>
<body>

        <button onclick="window.location.href='dashboard.html'" style="width: 100%;">เข้าสู่ระบบ</button>
        <p style="margin-top: 20px; font-size: 0.9rem;">
            ยังไม่มีบัญชี? <a href="#" onclick="alert('ระบบสมัครสมาชิกกำลังเปิดใช้งาน')">สมัครสมาชิกที่นี่</a>
        </p>
    </div>
</body>
</html>
