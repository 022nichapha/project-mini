<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Thunder Express - ยินดีต้อนรับ</title>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <h1 style="font-style: italic; margin-bottom: 10px;">⚡ THUNDER</h1>
            <p style="color: var(--gray-text); margin-bottom: 30px;">ระบบจัดการขนส่งอัจฉริยะ</p>

            <div class="auth-toggle">
                <button id="loginTab" class="toggle-btn active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
                <button id="regTab" class="toggle-btn" onclick="switchTab('register')">สมัครสมาชิก</button>
            </div>

            <div id="loginForm">
                <div class="form-group">
                    <label>เบอร์โทรศัพท์ / อีเมล</label>
                    <input type="text" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button class="btn-action" style="width: 100%;" onclick="location.href='dashboard.html'">เข้าสู่ระบบ</button>
                <p style="font-size: 0.8rem; margin-top: 20px; color: var(--gray-text); cursor: pointer;">ลืมรหัสผ่านใช่หรือไม่?</p>
            </div>

            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label>ชื่อ-นามสกุล</label>
                    <input type="text" placeholder="สมชาย สายชม">
                </div>
                <div class="form-group">
                    <label>เบอร์โทรศัพท์</label>
                    <input type="text" placeholder="08x-xxxxxxx">
                </div>
                <div class="form-group">
                    <label>รหัสผ่านใหม่</label>
                    <input type="password" id="pwInput" oninput="checkStrength()" placeholder="อย่างน้อย 8 ตัวอักษร">
                    <div class="pw-strength">
                        <div id="pwBar" class="pw-bar"></div>
                    </div>
                </div>
                <button class="btn-action" style="width: 100%;" onclick="handleRegister()">ยืนยันการสมัคร</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * ฟังก์ชันสลับหน้า Login และ Register
         * @param {string} type - 'login' หรือ 'register'
         */
        function switchTab(type) {
            const loginF = document.getElementById('loginForm');
            const regF = document.getElementById('registerForm');
            const loginT = document.getElementById('loginTab');
            const regT = document.getElementById('regTab');

            if(type === 'login') {
                loginF.classList.remove('hidden'); // แสดง Login
                regF.classList.add('hidden');       // ซ่อน Register
                loginT.classList.add('active');    // ไฮไลท์ปุ่ม Login
                regT.classList.remove('active');
            } else {
                loginF.classList.add('hidden');    // ซ่อน Login
                regF.classList.remove('hidden');  // แสดง Register
                loginT.classList.remove('active');
                regT.classList.add('active');     // ไฮไลท์ปุ่ม Register
            }
        }

        /**
         * HCI Feedback: วิเคราะห์ความยาวรหัสผ่านและแสดงสีแถบสถานะ
         * แดง = สั้นเกินไป, ส้ม = ปานกลาง, เขียว = ปลอดภัย
         */
        function checkStrength() {
            const val = document.getElementById('pwInput').value;
            const bar = document.getElementById('pwBar');
            
            if(val.length === 0) {
                bar.style.width = '0%';
            } else if(val.length < 5) {
                bar.style.width = '30%';
                bar.style.background = '#ff4444'; // สีแดง
            } else if(val.length < 8) {
                bar.style.width = '60%';
                bar.style.background = '#ffbb33'; // สีส้ม
            } else {
                bar.style.width = '100%';
                bar.style.background = '#00c851'; // สีเขียว
            }
        }

        /**
         * ฟังก์ชันสมมติเมื่อกดสมัครสมาชิกสำเร็จ
         */
        function handleRegister() {
            // HCI: แจ้งเตือนผู้ใช้ถึงสถานะที่เกิดขึ้น (Acknowledgment)
            alert('สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ');
            switchTab('login'); // สลับกลับไปหน้า Login อัตโนมัติเพื่อลดขั้นตอนผู้ใช้
        }
    </script>
</body>
</html>
