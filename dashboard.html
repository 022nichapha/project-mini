<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Thunder Express - ระบบจัดการพัสดุ</title>
</head>
<body>

    <nav>
        <div class="logo-section" onclick="location.href='dashboard.html'">
            <h1>⚡ THUNDER</h1>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">หน้าหลัก</a>
            <a href="tracking.html">ติดตามพัสดุ</a>
            <a href="calculator.html">เช็คราคา</a>
            <a href="index.html" style="color: #ff4444;">ออกจากระบบ</a>
        </div>
    </nav>

    <header class="hero">
        <h2 style="margin-bottom:25px;">ตรวจสอบสถานะพัสดุของคุณ</h2>
        <div class="search-box-container">
            <input type="text" id="trackInput" placeholder="กรอกหมายเลขพัสดุ 10 หลัก...">
            <button class="btn-search" onclick="location.href='tracking.html'">ค้นหา</button>
        </div>
    </header>

    <div class="content-section">
        <h3 style="text-align:center; margin-bottom:40px;">บริการแนะนำสำหรับคุณ</h3>
        
        <div class="grid">
            <div class="card">
                <div class="card-icon">📦</div>
                <h4>เพิ่มพัสดุ</h4>
                <p style="color:var(--gray-text)">ลงทะเบียนส่งพัสดุใหม่</p>
                <button class="btn-action" onclick="location.href='add-parcel.html'">เพิ่มข้อมูล</button>
            </div>

            <div class="card">
                <div class="card-icon">📑</div>
                <h4>เคลมพัสดุ</h4>
                <p style="color:var(--gray-text)">แจ้งปัญหาหรือขอเงินคืน</p>
                <button class="btn-action" onclick="location.href='claim.html'">แจ้งเรื่อง</button>
            </div>

            <div class="card">
                <div class="card-icon">🏠</div>
                <h4>รับพัสดุ</h4>
                <p style="color:var(--gray-text)">เรียกรถเข้ารับพัสดุที่บ้าน</p>
                <button class="btn-action" onclick="location.href='pickup.html'">เรียกนัดรับ</button>
            </div>
        </div>
    </div>

    <div id="toast-wrapper" class="toast-container"></div>

    <script>
        // ฟังก์ชันแสดงการตอบสนอง (HCI: Feedback)
        function checkURL() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('success')) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = '✅ ดำเนินการสำเร็จเรียบร้อยแล้ว';
                document.getElementById('toast-wrapper').appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        }
        window.onload = checkURL;
    </script>
</body>
</html>
